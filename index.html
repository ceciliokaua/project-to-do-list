<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Minhas Tarefas</h1>
            <div class="theme-wrapper">
                <button id="theme-toggle" class="btn-theme-reference" title="Alternar Tema">
                    🌙
                </button>
</div>
        </header>

        <div class="input-container">
            <input type="text" id="todo-input" placeholder="O que precisa ser feito?">
            <div class="datetime-group">
                <input type="datetime-local" id="todo-date">
                <button id="add-btn">Adicionar</button>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendentes</button>
            <button class="filter-btn" data-filter="completed">Concluídas</button>
            <button class="filter-btn" data-filter="deleted">Excluídas</button>
        </div>

        <ul id="todo-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
